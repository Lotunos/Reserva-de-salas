<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Geral de Reservas</title>
    <link rel="stylesheet" href="listarreservas.css">
</head>
<body>

<div class="container-completo">
    <h2>Todas as Reservas Agendadas</h2>
    <p class="subtitulo">Abaixo estão listadas todas as reservas ativas no sistema.</p>

    <!-- Tabela onde os dados vão aparecer -->
    <div class="tabela-responsiva">
        <table class="tabela-listagem">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Responsável</th>
                    <th>Data</th>
                    <th>Horário</th>
                    <th>Sala</th>
                    <th>Capacidade</th>
                    <th>Observação</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr>
                    <td colspan="7" class="mensagem-tabela">Carregando reservas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="/Frontend/js/listarreservas.js"></script>
</body>
</html>
