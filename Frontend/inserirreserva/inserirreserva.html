<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserir Reserva</title>
    <link rel="stylesheet" href="inserirreserva.css">
</head>
<body>
    <div class="container">
    <h2>Agendar Sala</h2>
    <form id="formAgendamento">
        
        <!-- Dropdown de Salas (Substituiu o input numérico antigo) -->
        <div class="form-group">
            <label for="idSala">Selecione a Sala *</label>
            <select id="idSala" name="idSala" required>
                <option value="" disabled selected>Carregando salas...</option>
            </select>
        </div>

        <!-- Campos de detalhes (Preenchidos dinamicamente via JS) -->
        <div class="form-row">
            <div class="form-group">
                <label for="detalheNome">Nome da Sala</label>
                <input type="text" id="detalheNome" readonly placeholder="Nenhuma sala selecionada">
            </div>
            <div class="form-group">
                <label for="detalheCapacidade">Capacidade (Pessoas)</label>
                <input type="text" id="detalheCapacidade" readonly placeholder="-">
            </div>
        </div>

        <!-- Responsável -->
        <div class="form-group">
            <label for="responsavel">Responsável *</label>
            <input type="text" id="responsavel" name="responsavel" required maxlength="100" placeholder="Nome do responsável">
        </div>

        <!-- Data -->
        <div class="form-group">
            <label for="data">Data *</label>
            <input type="date" id="data" name="data" required>
        </div>

        <!-- Horários -->
        <div class="form-row">
            <div class="form-group">
                <label for="inicio">Horário de Início *</label>
                <input type="time" id="inicio" name="inicio" required>
            </div>

            <div class="form-group">
                <label for="fim">Horário de Fim *</label>
                <input type="time" id="fim" name="fim" required>
            </div>
        </div>

        <!-- Observação -->
        <div class="form-group">
            <label for="observacao">Observação</label>
            <textarea id="observacao" name="observacao" placeholder="Alguma observação extra? (Opcional)"></textarea>
        </div>

        <button type="submit">Salvar Agendamento</button>
    </form>
</div>
    
</body>
<script src="/Frontend/js/listarsalas.js"></script>
</html>
